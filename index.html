<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>热门短剧</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    overflow: hidden;
  }

  /* 750 x 1624 设计基准，绝对定位居中 + 等比缩放（移动端可靠） */
  .viewport {
    width: 750px;
    height: 1624px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
  }
  .stage {
    width: 750px;
    height: 1624px;
    position: absolute;
    left: 0;
    top: 0;
    background: black;
    overflow: hidden;
  }

  .abs { position: absolute; }
  .abs img { display: block; }

  /* ============ 背景层 ============ */
  .bg-frame {
    width: 750px;
    height: 422px;
    left: 0;
    top: 544px;
    object-fit: cover;
    background: #000;
  }
  .bg-top    { left: 0; top: 0; }
  .bg-bottom { left: 0; top: 1024px; }
  .bg-mask {
    width: 750px;
    height: 140px;
    left: 0;
    top: 1484px;
    background: linear-gradient(0deg, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0) 100%);
  }

  /* ============ 进度条 ============ */
  .progress {
    width: 702px;
    height: 3px;
    left: 24px;
    top: 1481px;
  }
  .progress-inner {
    width: 702px;
    height: 3px;
    left: 0;
    top: 0;
  }
  .progress-track { left: 0; top: 0; }

  /* ============ Home 指示区 ============ */
  .home-indicator-area {
    width: 750px;
    height: 42px;
    left: 0;
    top: 1582px;
  }
  .home-indicator {
    width: 268px;
    height: 10px;
    left: 241px;
    top: 16px;
    background: white;
    border-radius: 5px;
  }

  /* ============ 状态栏 ============ */
  .status-bar {
    width: 750px;
    height: 88px;
    left: 0.40px;
    top: 0;
  }
  .status-time {
    width: 108px;
    height: 36px;
    left: 42px;
    top: 28px;
    text-align: center;
    color: white;
    font-size: 30px;
    font-weight: 600;
    line-height: 36px;
    letter-spacing: -0.02em;
  }
  .status-battery { left: 672.67px; top: 34.67px; }
  .status-wifi    { left: 632px;    top: 34.66px; }
  .status-signal  { left: 588px;    top: 35.33px; }

  /* ============ 导航栏 ============ */
  .nav-bar {
    width: 750px;
    height: 88px;
    left: 0;
    top: 88px;
    overflow: hidden;
  }
  .nav-back { left: 24px; top: 20px; }
  .nav-tools {
    width: 208px;
    height: 48px;
    left: 510px;
    top: 20px;
  }
  .nav-tool-1 { left: 0;     top: 0; }
  .nav-tool-2 { left: 80px;  top: 0; }
  .nav-tool-3 { left: 160px; top: 0; }

  /* ============ 右侧操作栏 ============ */
  .actions {
    width: 100px;
    height: 530px;
    left: 626px;
    top: 924px;
  }
  .avatar-wrap {
    width: 100px;
    height: 116px;
    left: 0;
    top: 0;
  }
  .avatar {
    width: 100px;
    height: 100px;
    left: 0;
    top: 0;
    opacity: 0.88;
    border-radius: 9999px;
    object-fit: cover;
  }
  .follow-btn {
    width: 94px;
    height: 40px;
    left: 3px;
    top: 76px;
    background: #136CE9;
    overflow: hidden;
    border-radius: 44px;
  }
  .follow-icon { left: 8px; top: 6px; }
  .follow-text {
    left: 36px;
    top: 5px;
    text-align: right;
    color: white;
    font-size: 22px;
    font-weight: 400;
    line-height: 30px;
  }

  .action-list {
    width: 72px;
    height: 382px;
    left: 14px;
    top: 148px;
  }
  .action-item {
    width: 72px;
    height: 106px;
    left: 0;
  }
  .action-item.like    { top: 0; }
  .action-item.comment { top: 138px; }
  .action-item.share   { top: 276px; }

  .action-icon {
    width: 72px;
    height: 72px;
    left: 0;
    top: 0;
    opacity: 0.92;
    filter: drop-shadow(0px 2px 2px rgba(0, 0, 0, 0.08));
  }

  .action-label {
    top: 76px;
    text-align: center;
    color: rgba(255, 255, 255, 0.92);
    font-size: 22px;
    font-weight: 500;
    line-height: 30px;
    text-shadow: 0px 2px 2px rgba(0, 0, 0, 0.08);
    white-space: nowrap;
  }
  .action-label.like    { left: 9.50px; }
  .action-label.comment { left: 14px; }
  .action-label.share   { left: 14px; }

  /* ============ 底部文案 ============ */
  .caption {
    width: 546px;
    height: 134px;
    left: 24px;
    top: 1320px;
  }
  .caption-title {
    width: 546px;
    height: 42px;
    left: 0;
    top: 0;
    color: white;
    font-size: 34px;
    font-weight: 500;
    line-height: 42px;
  }
  .caption-desc-wrap {
    width: 546px;
    height: 80px;
    left: 0;
    top: 54px;
  }
  .caption-desc {
    width: 546px;
    left: 0;
    top: 0;
    opacity: 0.90;
    color: white;
    font-size: 30px;
    font-weight: 400;
    line-height: 40px;
    word-wrap: break-word;
  }

  /* ============ 互动层（视频 19s 触发） ============ */
  /* 底部文案 & 右侧操作栏：进入互动态时淡出，动画 300ms */
  .caption,
  .actions {
    transition: opacity 300ms ease;
  }
  .interact-layer .caption,
  .interact-layer .actions {
    opacity: 0;
    pointer-events: none;
  }

  /* 互动标题横幅（底对齐；容器高度恒定，失败态仅底部单行显示红色块） */
  .interact-title {
    width: 750px;
    left: 0;
    top: auto;
    bottom: 597px;
    padding: 16px 24px;
    box-sizing: border-box;
    display: grid;
    justify-items: center;
    align-items: end;
    background: linear-gradient(90deg, rgba(51, 51, 51, 0) 0%, rgba(51, 51, 51, 0.80) 25%, rgba(51, 51, 51, 0.80) 75%, rgba(51, 51, 51, 0) 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  /* 蓄力失败：横幅背景换成红色渐变，仅覆盖底部单行高度（直接出现，无高度动画） */
  .interact-title.fail {
    background:
      linear-gradient(90deg, rgba(224, 32, 32, 0) 0%, rgba(224, 32, 32, 0.40) 25%, rgba(224, 32, 32, 0.40) 75%, rgba(224, 32, 32, 0) 100%),
      linear-gradient(90deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.70) 25%, rgba(0, 0, 0, 0.70) 75%, rgba(0, 0, 0, 0) 100%);
    background-repeat: no-repeat;
    background-size: 100% 78px;
    background-position: bottom;
  }
  /* 两层文案在同一 grid 格完全叠加，仅做 opacity 交叉淡化：初始文案 1→0 与失败文案 0→1 严格同时进行 */
  .interact-title-text {
    grid-area: 1 / 1;
    width: 590px;
    text-align: center;
    color: white;
    font-size: 34px;
    font-weight: 500;
    line-height: 46px;
    transition: opacity 300ms ease;
  }
  .it-orig { opacity: 1; }
  .it-fail { opacity: 0; }
  .interact-title.fail .it-orig { opacity: 0; }
  .interact-title.fail .it-fail { opacity: 1; }

  /* 长按组件 */
  .longpress {
    width: 340px;
    height: 314px;
    left: 205px;
    top: 1067px;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.86);
    transform-origin: center center;
    transition: opacity 300ms ease, transform 300ms ease;
  }
  /* 装饰弧线（沿半圆外缘的发光弧，位于长按组件顶部） */
  .lp-decor {
    width: 314px;
    height: 157px;
    left: 13px;
    top: 0;
    pointer-events: none;
  }
  .lp-decor img {
    width: 314px;
    height: 157px;
    left: 0;
    top: 0;
  }
  /* 底色圆晕（Figma 背景 PNG 素材，314×314） */
  .lp-halo1 {
    width: 314px;
    height: 314px;
    left: 13px;
    top: 0;
  }
  .lp-halo1 img {
    width: 314px;
    height: 314px;
    left: 0;
    top: 0;
    border-radius: 9999px;
  }
  /* 进度环轨道（底，半圆，浅橙 30%） */
  .lp-track {
    --start: -90deg;  /* 起始角：9 点方向 */
    --arc: 180deg;    /* 半圆（1/2 圆环）：9 点→12 点→3 点 */
    --ring: 31px;
    width: 285.25px;
    height: 285.25px;
    left: 27.375px;
    top: 14.375px;
    border-radius: 50%;
    background: conic-gradient(from var(--start),
        rgba(255, 255, 255, 0.12) 0deg,
        rgba(255, 255, 255, 0.12) var(--arc),
        transparent var(--arc));
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - var(--ring)), #000 calc(100% - var(--ring)));
            mask: radial-gradient(farthest-side, transparent calc(100% - var(--ring)), #000 calc(100% - var(--ring)));
  }
  /* 进度环前景（半圆内 Angular 渐变，--progress 0~1 控制 sweep，可用于交互） */
  .lp-progress {
    --progress: 0;    /* sweep 0~1，对应 Figma sweep 0% */
    --start: -90deg;  /* 起始角：9 点方向 */
    --arc: 180deg;    /* 半圆范围：9 点→12 点→3 点 */
    --ring: 31px;
    width: 285.25px;
    height: 285.25px;
    left: 27.375px;
    top: 14.375px;
    border-radius: 50%;
    /* 颜色渐变位置固定在整条半圆上（起浅→中蓝→末紫），进度只控制"露出"多少，蓄力时颜色自然过渡 */
    background: conic-gradient(from var(--start),
        #DEE3EF 0deg,
        #4877EF calc(var(--arc) * 0.5),
        #884DFF var(--arc),
        transparent var(--arc));
    /* 双层遮罩：conic 控制进度露出到 --progress，radial 裁出环形，二者取交集 */
    -webkit-mask:
        conic-gradient(from var(--start), #000 0deg, #000 calc(var(--arc) * var(--progress)), transparent calc(var(--arc) * var(--progress))),
        radial-gradient(farthest-side, transparent calc(100% - var(--ring)), #000 calc(100% - var(--ring)));
    -webkit-mask-composite: source-in;
            mask:
        conic-gradient(from var(--start), #000 0deg, #000 calc(var(--arc) * var(--progress)), transparent calc(var(--arc) * var(--progress))),
        radial-gradient(farthest-side, transparent calc(100% - var(--ring)), #000 calc(100% - var(--ring)));
            mask-composite: intersect;
    opacity: 0;            /* 进度条1 初始透明度 0，蓄力时显现 */
    transition: none;
  }
  /* 进度块（跟随进度头沿半圆环移动，长边始终指向圆心，样式对齐 Figma 4/7/10.svg） */
  .lp-slider {
    width: 36px;
    height: 8px;
    left: 0;
    top: 0;
    border-radius: 4px;
    background: #FCECDD;
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.30);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) rotate(0deg);
    transition: opacity 200ms ease;
    will-change: left, top, transform, opacity;
  }

  /* 中心钮（按 Figma 结构：Ellipse + 背景 + 内阴影 + 星光 + 文案，热区 194×194 居中于 294×294） */
  .lp-btn {
    width: 294px;
    height: 294px;
    left: 23px;
    top: 8px;
    transform-origin: center center;
    transition: transform 120ms ease;
    cursor: pointer;
  }
  /* 按下反馈缩到 core / 底衬 / 文案（三者同步缩放） */
  .lp-btn.pressing .lp-btn-core,
  .lp-btn.pressing .lp-btn-plate,
  .lp-btn.pressing .lp-btn-text { transform: scale(0.96); }

  /* 按钮底衬（Figma：208×208 白色 20% 透明圆，位于内芯之下） */
  .lp-btn-plate {
    width: 208px;
    height: 208px;
    left: 43px;   /* (294-208)/2 */
    top: 43px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.20);
    transform-origin: center center;
    transition: transform 120ms ease;
  }

  /* 内芯 194×194 圆形容器（作为 mask 遮罩区域） */
  .lp-btn-core {
    width: 194px;
    height: 194px;
    left: 50px;   /* (294-194)/2 */
    top: 50px;
    border-radius: 50%;
    overflow: hidden;    /* 桌面端裁切兜底 */
    /* iOS/微信下 overflow+border-radius 对 transform 动画子元素裁切失效，用 mask 强制圆形裁切 */
    -webkit-mask: radial-gradient(circle 97px at 50% 50%, #000 99.5%, transparent 100%);
            mask: radial-gradient(circle 97px at 50% 50%, #000 99.5%, transparent 100%);
    transform-origin: center center;
    transition: transform 120ms ease;
  }
  /* 底层 Ellipse（radial: #FCF4EC → #FDEAD9） */
  .lp-btn-ellipse {
    width: 194px;
    height: 194px;
    left: 0;
    top: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse 50% 50% at 50% 50%, #FCF4EC 70%, #FDEAD9 100%);
  }
  /* 背景暖晕（Figma 2.png：外层 wrap 做缩放呼吸，内层 img 中心旋转，两者叠加） */
  .lp-btn-bg-wrap {
    width: 194px;
    height: 194px;
    left: 0;
    top: 0;
    transform-origin: 50% 50%;
    animation: lp-btn-bg-breathe 2.4s ease-in-out infinite;
  }
  .lp-btn-bg-img {
    display: block;
    width: 194px;
    height: 194px;
    transform-origin: 50% 50%;
    animation: lp-btn-bg-spin 6s linear infinite;
  }
  @keyframes lp-btn-bg-breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(2); }
  }
  @keyframes lp-btn-bg-spin {
    to { transform: rotate(360deg); }
  }
  /* 内阴影（Figma 1.svg，圆内暗边） */
  .lp-btn-shadow {
    width: 194px;
    height: 194px;
    left: 0;
    top: 0;
    pointer-events: none;
  }

  /* 星光层（整张 Figma 星光，严格在 194 圆内，常驻缩放/透明度呼吸） */
  .lp-sparkles-wrap {
    width: 194px;
    height: 194px;
    left: 0;
    top: 0;
    pointer-events: none;
    transform-origin: 50% 50%;
    animation: lp-sparkles-breathe 2.8s ease-in-out infinite;
  }
  .lp-sparkles-img {
    display: block;
    width: 194px;
    height: 194px;
    filter: brightness(1.5);
  }
  @keyframes lp-sparkles-breathe {
    0%, 100% { transform: scale(0.85); opacity: 0.45; }
    50%      { transform: scale(1.10); opacity: 1;    }
  }

  /* 文案（Figma 文字 SVG，字体已转路径，跨设备一致；flex 居中于 194 内芯） */
  .lp-btn-text {
    left: 50px;
    top: 50px;
    width: 194px;
    height: 194px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transform-origin: center center;
    transition: transform 120ms ease;
  }
  .lp-btn-label {
    display: block;
    width: 79px;
    height: 82px;
  }

  /* 成功粒子炸裂层（以圆环中心为锚点放射扩散，800ms） */
  .burst {
    width: 0;
    height: 0;
    left: 375px;    /* 圆环中心 X */
    top: 1224px;    /* 圆环中心 Y */
    opacity: 0;
    pointer-events: none;
  }
  .burst-p {
    left: 0;
    top: 0;
    opacity: 0;
    will-change: transform, opacity;
  }
  .burst.burst-active {
    opacity: 1;
  }
  .burst.burst-active .burst-p {
    animation: burst-fly 400ms ease-out forwards;
  }
  @keyframes burst-fly {
    0% {
      transform: translate(-50%, -50%) scale(0.2);
      opacity: 0;
    }
    30% {
      /* 扩散到红色区域范围，透明度达到 100% */
      transform: translate(calc(-50% + var(--px)), calc(-50% + var(--py))) scale(1.1);
      opacity: 1;
    }
    100% {
      /* 继续向外扩散（可超出红色区域）并淡出消失 */
      transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5);
      opacity: 0;
    }
  }

  /* 关闭按钮 */
  .interact-close {
    width: 64px;
    height: 64px;
    left: 343px;
    top: 1369px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  .interact-close img { left: 0; top: 0; }

  /* 激活态：互动元素淡入 */
  .interact-layer .interact-title,
  .interact-layer .longpress,
  .interact-layer .interact-close {
    opacity: 1;
    pointer-events: auto;
  }
  .interact-layer .longpress {
    transform: scale(1);
  }

  /* 结果态：隐藏互动组件与原互动标题（底部文案/右侧操作栏仍随 interact-layer 保持隐藏） */
  .stage.result .interact-title,
  .stage.result .longpress,
  .stage.result .interact-close {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  /* ============ 结果页（长按成功后） ============ */
  /* 底部遮罩，增强文案与卡片可读性 */
  .result-mask {
    left: 0;
    top: 824px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  .result-mask.show { opacity: 1; }

  /* 蓄力成功提示文案横幅 */
  .success-title {
    width: 622px;
    height: 132px;
    left: 64px;
    top: 887px;
    background: linear-gradient(90deg, rgba(51, 51, 51, 0) 0%, rgba(51, 51, 51, 0.80) 25%, rgba(51, 51, 51, 0.80) 75%, rgba(51, 51, 51, 0) 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  .success-title.show { opacity: 1; }
  .success-title-text {
    width: 574px;
    left: 24px;
    top: 16px;
    text-align: center;
    color: white;
    font-size: 34px;
    font-weight: 500;
    line-height: 46px;
  }

  /* 短剧卡 */
  .drama-card {
    width: 670px;
    height: 370px;
    left: 40px;
    top: 1063px;
    border-radius: 24px;
    background-size: cover;
    background-position: center;
    overflow: hidden;
    opacity: 0;
    transform: translateY(48px);
    pointer-events: none;
    transition: opacity 300ms ease, transform 300ms ease;
  }
  .drama-card.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .dc-cover {
    width: 241px;
    height: 322px;
    left: 24px;
    top: 24px;
    border-radius: 8px;
    object-fit: cover;
  }
  .dc-content {
    width: 357px;
    height: 304px;
    left: 289px;
    top: 33px;
  }
  .dc-title {
    width: 307px;
    left: 0;
    top: 0;
    color: white;
    font-size: 32px;
    font-weight: 500;
    line-height: 44px;
  }
  .dc-desc {
    width: 357px;
    left: 0;

    font-size: 26px;
    font-weight: 400;
    line-height: 34px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .dc-tags {
    width: 264px;

  }
  .dc-tag {
    height: 40px;

  }
  .dc-tag-text {
    left: 8px;

    white-space: nowrap;
  }
  .dc-tag-1 { width: 112px; left: 0; }
  .dc-tag-1-bg {
    width: 112px;

    left: 0;

    opacity: 0.10;

  }
  .dc-tag-2 { width: 64px; left: 124px; }
  .dc-tag-3 { width: 64px; left: 200px; }
  .dc-tag-icon { left: 0; top: 0; }
  .dc-btn {
    width: 357px;
    height: 80px;
    left: 0;
    top: 224px;
    background: #205AEF; /* Figma NewBlue */
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
  }
  .dc-btn-icon { left: 90.50px; top: 26px; }
  .dc-btn-text {
    left: 126.50px;
    top: 22px;
    text-align: center;
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 500;
    line-height: 36px;
  }
  .dc-close {
    left: 620px;
    top: 24px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="stage" id="stage">

      <!-- 背景层 -->
      <div class="stage" style="background: transparent;">
        <!-- 视频帧：可播放视频素材 -->
        <video class="abs bg-frame" src="assets/ai-drama.mp4"
               autoplay loop muted playsinline
               preload="auto" x5-playsinline webkit-playsinline></video>
        <div class="abs bg-top"><img src="assets/base/mask-top.svg" alt="" /></div>
        <div class="abs bg-bottom"><img src="assets/base/mask-bottom.svg" alt="" /></div>
        <div class="abs bg-mask"></div>
      </div>

      <!-- 进度条 -->
      <div class="abs progress">
        <div class="abs progress-inner">
          <div class="abs progress-track"><img src="assets/base/progress-track.svg?v=2" alt="" /></div>
        </div>
      </div>

      <!-- Home 指示区 -->
      <div class="abs home-indicator-area">
        <div class="abs home-indicator"></div>
      </div>

      <!-- 状态栏 -->
      <div class="abs status-bar">
        <div class="abs status-time">9:41</div>
        <div class="abs status-battery"><img src="assets/base/status-battery.svg" alt="" /></div>
        <div class="abs status-wifi"><img src="assets/base/status-wifi.svg" alt="" /></div>
        <div class="abs status-signal"><img src="assets/base/status-signal.svg" alt="" /></div>
      </div>

      <!-- 导航栏 -->
      <div class="abs nav-bar">
        <div class="abs nav-back"><img src="assets/base/nav-back.svg" alt="" /></div>
        <div class="abs nav-tools">
          <div class="abs nav-tool-1"><img src="assets/base/nav-tool-1.svg" alt="" /></div>
          <div class="abs nav-tool-2"><img src="assets/base/nav-tool-2.svg" alt="" /></div>
          <div class="abs nav-tool-3"><img src="assets/base/nav-tool-3.svg" alt="" /></div>
        </div>
      </div>

      <!-- 右侧操作栏 -->
      <div class="abs actions">
        <div class="abs avatar-wrap">
          <img class="abs avatar" src="assets/base/avatar.png" alt="" />
        </div>
        <div class="abs follow-btn">
          <div class="abs follow-icon"><img src="assets/base/action-follow.svg" alt="" /></div>
          <div class="abs follow-text">关注</div>
        </div>

        <div class="abs action-list">
          <div class="abs action-item like">
            <div class="abs action-icon"><img src="assets/base/action-like.svg" alt="" /></div>
            <div class="abs action-label like">2240</div>
          </div>
          <div class="abs action-item comment">
            <div class="abs action-icon"><img src="assets/base/action-comment.svg" alt="" /></div>
            <div class="abs action-label comment">评论</div>
          </div>
          <div class="abs action-item share">
            <div class="abs action-icon"><img src="assets/base/action-share.svg" alt="" /></div>
            <div class="abs action-label share">转发</div>
          </div>
        </div>
      </div>

      <!-- 底部文案 -->
      <div class="abs caption">
        <div class="abs caption-title">@热门短剧</div>
        <div class="abs caption-desc-wrap">
          <div class="abs caption-desc">一朝穿越来到新蓝星世界，随身携带成就系统，努力成为国际巨星！</div>
        </div>
      </div>

      <!-- ============ 互动层（视频 19s 触发） ============ -->
      <!-- 互动标题横幅 -->
      <div class="abs interact-title" id="interactTitle">
        <div class="interact-title-text it-orig">主持人激情介绍完毕，男主即将登台！快来长按帮他稳住气场！</div>
        <div class="interact-title-text it-fail">蓄力失败，请再次尝试～</div>
      </div>

      <!-- 长按组件 -->
      <div class="abs longpress" id="longpress">
        <div class="abs lp-decor"><img class="abs" src="assets/longpress/decor-arc.svg?v=3" alt="" /></div>
        <div class="abs lp-track"></div>
        <div class="abs lp-halo1"><img class="abs" src="assets/longpress/halo-bg.png?v=2" alt="" /></div>
        <div class="abs lp-progress" id="lpProgress"></div>
        <div class="abs lp-slider" id="lpSlider"></div>
        <!-- 中心钮（Figma 层：Ellipse + 背景 + 星光 + 内阴影 + 文案；热区 194×194 居中于 294×294） -->
        <div class="abs lp-btn">
          <div class="abs lp-btn-plate"></div>
          <div class="abs lp-btn-core">
            <div class="abs lp-btn-ellipse"></div>
            <div class="abs lp-btn-bg-wrap"><img class="lp-btn-bg-img" src="assets/longpress/btn-bg.png?v=2" alt="" /></div>
            <img class="abs lp-btn-shadow" src="assets/longpress/btn-inner-shadow.svg" alt="" />
            <div class="abs lp-sparkles-wrap"><img class="lp-sparkles-img" src="assets/longpress/btn-sparkle.png?v=2" alt="" /></div>
          </div>
          <div class="abs lp-btn-text"><img class="lp-btn-label" src="assets/longpress/btn-label.svg" alt="点击长按" /></div>
        </div>
      </div>

      <!-- 成功粒子炸裂层（粒子由脚本动态生成） -->
      <div class="abs burst" id="burst"></div>

      <!-- 关闭按钮 -->
      <div class="abs interact-close" id="interactClose">
        <img class="abs" src="assets/longpress/close-ring.svg" alt="" />
        <img class="abs" src="assets/longpress/close-cross.svg" alt="" />
      </div>

      <!-- ============ 结果页（长按成功后） ============ -->
      <!-- 底部遮罩 -->
      <div class="abs result-mask" id="resultMask">
        <img src="assets/drama-card/mask.svg" alt="" />
      </div>

      <!-- 蓄力成功提示文案 -->
      <div class="abs success-title" id="successTitle">
        <div class="abs success-title-text">长按蓄力成功！男主自信登台，震撼全场，点击进入全集查看精彩演唱！</div>
      </div>

      <!-- 短剧卡 -->
      <div class="abs drama-card" id="dramaCard"
           style="background-image: linear-gradient(0deg, rgba(33,28,27,0.5), rgba(33,28,27,0.5)), url('assets/drama-card/card-bg.png');">
        <img class="abs dc-cover" src="assets/drama-card/cover.png" alt="" />
        <div class="abs dc-content">
          <div class="abs dc-title">绿花之旅</div>
          <div class="abs dc-desc">巨星歌手林云逸重生至平行世界同名文艺兵身上，一开局就被查出绝症晚期只好提前退伍</div>
          <div class="abs dc-tags">
            <div class="abs dc-tag dc-tag-1">
              <div class="abs dc-tag-1-bg"></div>
              <div class="abs dc-tag-text">系统穿越</div>
            </div>
            <div class="abs dc-tag dc-tag-2">
              <img class="abs dc-tag-icon" src="assets/drama-card/tag-task.svg" alt="" />
              <div class="abs dc-tag-text">任务</div>
            </div>
            <div class="abs dc-tag dc-tag-3">
              <img class="abs dc-tag-icon" src="assets/drama-card/tag-idea.svg" alt="" />
              <div class="abs dc-tag-text">脑洞</div>
            </div>
          </div>
          <div class="abs dc-btn" id="dramaCardBtn">
            <div class="abs dc-btn-icon"><img src="assets/drama-card/btn-icon.svg?v=2" alt="" /></div>
            <div class="abs dc-btn-text">看后续剧情</div>
          </div>
        </div>
        <div class="abs dc-close" id="dramaCardClose">
          <img src="assets/drama-card/close.svg" alt="" />
        </div>
      </div>

    </div>
  </div>

  <script>
    // 等比缩放，保证 750x1624 设计在任意屏幕居中且完整显示
    function fitViewport() {
      var vp = document.getElementById('viewport');
      var w = document.documentElement.clientWidth || window.innerWidth;
      var h = document.documentElement.clientHeight || window.innerHeight;
      var scale = Math.min(w / 750, h / 1624);
      vp.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
    }
    window.addEventListener('resize', fitViewport);
    window.addEventListener('orientationchange', fitViewport);
    fitViewport();

    // 视频自动播放（进度条为纯净轨道，不再显示已播放高亮）
    (function () {
      var video = document.querySelector('.bg-frame');
      if (!video) return;
      // 兼容部分浏览器自动播放策略
      var p = video.play();
      if (p && p.catch) { p.catch(function () {}); }
    })();

    // 视频播放到 19s（军中绿花）：暂停并进入互动态，动画 300ms
    (function () {
      var video = document.querySelector('.bg-frame');
      var stage = document.getElementById('stage');
      var closeBtn = document.getElementById('interactClose');
      var TRIGGER = 19; // 触发时间点（秒）
      var triggered = false;
      if (!video || !stage) return;

      // 关闭互动组件，恢复播放并淡入原界面（底部文案/右侧操作区 300ms）
      function doClose() {
        stage.classList.remove('interact-layer');
        var pr = video.play();
        if (pr && pr.catch) { pr.catch(function () {}); }
      }

      video.addEventListener('timeupdate', function () {
        if (!triggered && video.currentTime >= TRIGGER) {
          triggered = true;
          video.pause();
          // 淡出底部文案 & 右侧操作栏，淡入互动标题与长按组件
          stage.classList.add('interact-layer');
        }
      });

      // 关闭：退出互动态并恢复播放
      if (closeBtn) {
        closeBtn.addEventListener('click', doClose);
      }
    })();

    // 长按「稳住气场」：按住中心钮蓄力，进度环增长填满即成功
    (function () {
      var longpress = document.getElementById('longpress');
      var progressEl = document.getElementById('lpProgress');
      var stage = document.getElementById('stage');
      var video = document.querySelector('.bg-frame');
      var btn = longpress ? longpress.querySelector('.lp-btn') : null;
      var burst = document.getElementById('burst');
      var sliderEl = document.getElementById('lpSlider');
      if (!longpress || !progressEl || !stage) return;

      var HOLD_MS = 800;    // 按住填满所需时长（0.8s）
      var DECAY_MS = 1200;  // 松手回落时长
      var progress = 0;     // 当前进度 0~1
      var holding = false;
      var lastTs = 0;
      var rafId = null;
      var done = false;
      var failTimer = null;
      var titleEl = document.getElementById('interactTitle');

      // 蓄力失败：横幅切到红色失败文案（与原文案交叉淡入淡出），1 秒后交叉恢复
      function showFail() {
        if (failTimer) clearTimeout(failTimer);
        if (titleEl) titleEl.classList.add('fail');
        failTimer = setTimeout(function () {
          failTimer = null;
          if (titleEl) titleEl.classList.remove('fail');
        }, 1000);
      }
      function clearFail() {
        if (failTimer) { clearTimeout(failTimer); failTimer = null; }
        if (titleEl) titleEl.classList.remove('fail');
      }

      function setProgress(v) {
        progress = Math.max(0, Math.min(1, v));
        progressEl.style.setProperty('--progress', progress.toFixed(4));
        progressEl.style.opacity = progress > 0 ? '1' : '0';
        updateSlider(progress);
      }

      // 进度块跟随进度头：沿半圆环从 9 点→12 点→3 点移动，长边始终指向圆心
      var LP_CX = 170, LP_CY = 157, LP_R = 127; // 圆环中心与环中心半径
      function updateSlider(p) {
        if (!sliderEl) return;
        if (p <= 0) { sliderEl.style.opacity = '0'; return; }
        sliderEl.style.opacity = '1';
        var ang = -90 + 180 * p;            // 从 12 点顺时针的角度（-90°=9点, 0°=12点, 90°=3点）
        var rad = ang * Math.PI / 180;
        var x = LP_CX + LP_R * Math.sin(rad);
        var y = LP_CY - LP_R * Math.cos(rad);
        sliderEl.style.left = x.toFixed(2) + 'px';
        sliderEl.style.top = y.toFixed(2) + 'px';
        sliderEl.style.transform = 'translate(-50%, -50%) rotate(' + (ang + 90).toFixed(2) + 'deg)';
      }

      function tick(ts) {
        if (!lastTs) lastTs = ts;
        var dt = ts - lastTs;
        lastTs = ts;
        setProgress(progress + (holding ? dt / HOLD_MS : -dt / DECAY_MS));
        if (progress >= 1 && !done) { complete(); return; }
        if (holding || progress > 0) {
          rafId = requestAnimationFrame(tick);
        } else {
          rafId = null;
          lastTs = 0;
        }
      }

      function begin(e) {
        if (done) return;
        e.preventDefault();
        clearFail(); // 重新长按，清除上一次失败提示
        holding = true;
        lastTs = 0;
        if (btn) btn.classList.add('pressing');
        if (!rafId) rafId = requestAnimationFrame(tick);
      }

      function release() {
        if (done) return;
        holding = false;
        lastTs = 0;
        if (btn) btn.classList.remove('pressing');
        // 有明显蓄力但未满 → 蓄力失败
        if (progress > 0.05 && progress < 1) showFail();
        if (!rafId && progress > 0) rafId = requestAnimationFrame(tick);
      }

      function complete() {
        done = true;
        holding = false;
        clearFail(); // 成功则清除失败提示
        setProgress(1);
        if (btn) btn.classList.remove('pressing');
        // 触发粒子炸裂氛围动效（400ms）
        spawnBurst();
        // 氛围动效结束后：进入结果态、恢复播放，并显示蓄力成功文案
        setTimeout(function () {
          // 保留 interact-layer 使底部文案/右侧操作栏保持隐藏，仅隐藏互动组件
          stage.classList.add('result');
          if (video) {
            var pr = video.play();
            if (pr && pr.catch) { pr.catch(function () {}); }
          }
          var resultMask = document.getElementById('resultMask');
          var successTitle = document.getElementById('successTitle');
          var dramaCard = document.getElementById('dramaCard');
          if (resultMask) resultMask.classList.add('show');
          if (successTitle) successTitle.classList.add('show');
          // 间隔 300ms 后，短剧卡向上位移 + 淡入出现（300ms）
          setTimeout(function () {
            if (dramaCard) dramaCard.classList.add('show');
          }, 300);
        }, 500); // 400ms 动画 + 余量

        // 短剧卡关闭按钮
        var dcClose = document.getElementById('dramaCardClose');
        if (dcClose && !dcClose._bound) {
          dcClose._bound = true;
          dcClose.addEventListener('click', function () {
            var card = document.getElementById('dramaCard');
            var successTitle = document.getElementById('successTitle');
            var resultMask = document.getElementById('resultMask');
            // 短剧卡与上方标题（含遮罩）一起淡出（300ms）
            if (card) card.classList.remove('show');
            if (successTitle) successTitle.classList.remove('show');
            if (resultMask) resultMask.classList.remove('show');
            // 淡出结束后，恢复原先的底部文案与右侧操作区（300ms 淡入）
            setTimeout(function () {
              stage.classList.remove('result');
              stage.classList.remove('interact-layer');
            }, 300);
          });
        }
      }

      // 动态生成粒子并触发炸裂
      function spawnBurst() {
        if (!burst) return;
        // 粒子数量/位置/造型严格按 Figma（相对圆环中心 375,1224 的偏移）
        // 星星：15/16/17.svg  圆点簇：18/19.svg
        var particles = [
          { s: 'star-2', px: -198, py:  -49 },  // 星 · 左中
          { s: 'star-1', px:   93, py: -170 },  // 星 · 上偏右
          { s: 'star-3', px:  183, py:  -87 },  // 星 · 右上
          { s: 'star-3', px:  156, py:   41 },  // 星 · 右下
          { s: 'star-3', px: -139, py:   41 },  // 星 · 左下
          { s: 'dots-2', px:  -18, py: -156 },  // 圆点簇 · 正上
          { s: 'dots-1', px: -138, py: -107 },  // 圆点簇 · 左上
          { s: 'dots-2', px: -189, py:   36 },  // 圆点簇 · 左
          { s: 'dots-1', px:  197, py:  -26 }   // 圆点簇 · 右
        ];
        var K = 1.45;      // 最终位置相对峰值继续扩散的倍数
        var SHRINK = 0.75; // 峰值位置整体往内收
        var frag = document.createDocumentFragment();
        particles.forEach(function (p) {
          var img = document.createElement('img');
          img.className = 'abs burst-p';
          img.src = 'assets/particles/' + p.s + '.svg';
          var px = p.px * SHRINK, py = p.py * SHRINK;
          img.style.setProperty('--px', px.toFixed(1) + 'px');
          img.style.setProperty('--py', py.toFixed(1) + 'px');
          img.style.setProperty('--tx', (px * K).toFixed(1) + 'px');
          img.style.setProperty('--ty', (py * K).toFixed(1) + 'px');
          img.style.animationDelay = (Math.random() * 50).toFixed(0) + 'ms';
          frag.appendChild(img);
        });
        burst.innerHTML = '';
        burst.appendChild(frag);
        // 重启动画
        burst.classList.remove('burst-active');
        void burst.offsetWidth;
        burst.classList.add('burst-active');
      }

      longpress.addEventListener('pointerdown', begin);
      window.addEventListener('pointerup', release);
      longpress.addEventListener('pointercancel', release);
    })();
  </script>
</body>
</html>
